<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaKart — Choose Your Vibe</title>
  <meta name="description"
    content="MediaKart — Choose your vibe: Night Energy, Sunset Soul, Music Tribe, Free Spirit." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Video Intro Overlay -->
  <div id="video-overlay" class="video-overlay">
    <video id="intro-video" class="intro-video" autoplay muted playsinline>
      <source src="video/GoaFest.webm" type="video/webm">
    </video>
    <div class="video-overlay-ui">
      <button id="experience-btn" class="experience-btn"></button>
    </div>
  </div>

  <!-- Background -->
  <div class="bg-layer"></div>

  <!-- Global AI effects layer (particles + neural lines + dot grid) -->
  <div class="ai-effects-layer">
    <div class="parallax-layer" id="page-parallax">
      <div class="ai-particle" style="width:9px;height:9px;background:#7c3aed;left:8%;top:72%;animation-duration:4.5s;animation-delay:0s;"></div>
      <div class="ai-particle" style="width:5px;height:5px;background:#3b82f6;left:22%;top:80%;animation-duration:5.2s;animation-delay:1s;"></div>
      <div class="ai-particle" style="width:7px;height:7px;background:#06b6d4;left:55%;top:78%;animation-duration:4s;animation-delay:0.5s;"></div>
      <div class="ai-particle" style="width:6px;height:6px;background:#6366f1;left:70%;top:74%;animation-duration:4.8s;animation-delay:1.6s;"></div>
      <div class="ai-particle" style="width:4px;height:4px;background:#a78bfa;left:88%;top:68%;animation-duration:5.5s;animation-delay:2.2s;"></div>
      <div class="ai-particle" style="width:8px;height:8px;background:#7c3aed;left:3%;top:55%;animation-duration:3.9s;animation-delay:0.8s;"></div>
      <div class="ai-particle" style="width:5px;height:5px;background:#06b6d4;left:40%;top:82%;animation-duration:4.3s;animation-delay:1.4s;"></div>
      <div class="ai-particle" style="width:6px;height:6px;background:#3b82f6;left:93%;top:60%;animation-duration:5s;animation-delay:0.3s;"></div>
      <div class="ai-particle" style="width:4px;height:4px;background:#a78bfa;left:15%;top:20%;animation-duration:4.7s;animation-delay:2s;"></div>
      <div class="ai-particle" style="width:7px;height:7px;background:#6366f1;left:80%;top:18%;animation-duration:5.1s;animation-delay:0.7s;"></div>
    </div>
    <div class="neural-line" style="width:130px;left:5%;top:30%;transform:rotate(20deg);animation-delay:0s;"></div>
    <div class="neural-line" style="width:100px;left:75%;top:20%;transform:rotate(-15deg);animation-delay:1.2s;"></div>
    <div class="neural-line" style="width:160px;left:25%;top:70%;transform:rotate(10deg);animation-delay:0.6s;"></div>
    <div class="neural-line" style="width:90px;left:60%;top:65%;transform:rotate(-25deg);animation-delay:1.8s;"></div>
    <div class="neural-line" style="width:110px;left:45%;top:10%;transform:rotate(5deg);animation-delay:2.4s;"></div>
  </div>
  <div class="page-cursor-glow" id="page-cursor-glow"></div>

  <!-- Main Wrapper -->
  <main class="main-wrapper" id="main-content" style="opacity:0;pointer-events:none;">

    <!-- Logo -->
    <div class="logo-wrap" id="logo-wrap">
      <img src="Final Logo_9_without white bg_with tagline.png" alt="MediaKart Logo" class="logo-img" />
    </div>

    <!-- Heading -->
    <div class="heading-wrap">
      <h1 class="vibe-text">CHOOSE YOUR VIBE</h1>
      <div class="divider-line">
        <span class="divider-dash"></span>
        <span class="divider-diamond">✦</span>
        <span class="divider-dash"></span>
      </div>
    </div>

    <!-- Cards Row -->
    <div class="cards-row" id="cards-row">

      <!-- Card 1: Night Energy -->
      <div class="vibe-card night-card" id="card-night" data-vibe="night">
        <div class="card-inner">
          <img src="card/night-energy.png" alt="The Night Energy" class="card-img" />
        </div>
        <div class="card-glow night-glow"></div>
        <div class="icon-platform night-platform">
          <img src="icon/icon-night-energy.png" alt="Moon icon" class="vibe-icon" />
        </div>
      </div>

      <!-- Card 2: Sunset Soul -->
      <div class="vibe-card sunset-card" id="card-sunset" data-vibe="sunset">
        <div class="card-inner">
          <img src="card/sunset-soul.png" alt="The Sunset Soul" class="card-img" />
        </div>
        <div class="card-glow sunset-glow"></div>
        <div class="icon-platform sunset-platform">
          <img src="icon/icon-sunset-soul.png" alt="Sunset icon" class="vibe-icon" />
        </div>
      </div>

      <!-- Card 3: Music Tribe -->
      <div class="vibe-card music-card" id="card-music" data-vibe="music">
        <div class="card-inner">
          <img src="card/music-tribe.png" alt="The Music Tribe" class="card-img" />
        </div>
        <div class="card-glow music-glow"></div>
        <div class="icon-platform music-platform">
          <img src="icon/icon-music-tribe.png" alt="Music icon" class="vibe-icon" />
        </div>
      </div>

      <!-- Card 4: Free Spirit -->
      <div class="vibe-card spirit-card" id="card-spirit" data-vibe="spirit">
        <div class="card-inner">
          <img src="card/free-spirit.png" alt="The Free Spirit" class="card-img" />
        </div>
        <div class="card-glow spirit-glow"></div>
        <div class="icon-platform spirit-platform">
          <img src="icon/icon-free-spirit.png" alt="Spirit icon" class="vibe-icon" />
        </div>
      </div>

    </div>
    <!-- /cards-row -->

  </main>

  <!-- Replay Video Button -->
  <button class="replay-video-btn" id="replay-video-btn" title="Replay Intro Video">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="5 3 19 12 5 21 5 3"></polygon>
    </svg>
  </button>

  <script src="app.js"></script>
</body>

</html>
